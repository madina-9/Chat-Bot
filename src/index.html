<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Felix Chat</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="./main.js"></script>
  </head>

  <body class="min-h-screen bg-[#f7f5ef] text-black font-sans">
    <div class="h-screen grid grid-cols-12">
      <!-- Sidebar -->
      <aside class="col-span-3 bg-white border-r border-[#ddd] flex flex-col">
        <div class="p-5">
          <button
            class="w-full rounded-2xl bg-black text-white py-3 text-sm font-semibold shadow-sm hover:opacity-90 transition"
          >
            + New Chat
          </button>
        </div>

        <div class="px-5 pb-3 text-xs uppercase tracking-wider text-gray-500">
          Our memories
        </div>

        <nav class="flex-1 px-3 space-y-2">
          <button
            class="w-full text-left rounded-2xl px-4 py-3 bg-[#efefef] border border-[#ddd]"
          >
            <div class="font-semibold">Felix Support</div>
            <div class="text-xs text-gray-500">Active</div>
          </button>

          <button
            class="w-full text-left rounded-2xl px-4 py-3 hover:bg-[#f2f2f2]"
          >
            <div class="font-semibold">Morroco Spring Break Trip</div>
          </button>

          <button
            class="w-full text-left rounded-2xl px-4 py-3 hover:bg-[#f2f2f2]"
          >
            <div class="font-semibold">Thriller Movies Recs</div>
          </button>
        </nav>

        <div class="border-t border-[#ddd] p-5">
          <div class="text-sm font-semibold">My Companion</div>
        </div>
      </aside>

      <!-- Main Chat -->
      <main class="col-span-9 flex flex-col bg-white">
        <!-- Top Bar -->
        <header
          class="bg-black text-white px-6 py-4 flex items-center justify-between"
        >
          <div>
            <div class="text-sm font-semibold">Felix AI</div>
            <div class="text-xs opacity-70">
              Your intelligent feline assistant
            </div>
          </div>

          <div class="flex items-center gap-3">
            <button
              type="button"
              class="rounded-xl bg-white/10 px-4 py-2 text-xs font-medium hover:bg-white/20 transition"
            >
              Share
            </button>

            <button
              type="button"
              class="rounded-xl bg-white/10 px-4 py-2 text-xs font-medium hover:bg-white/20 transition"
            >
              Support
            </button>
          </div>
        </header>

        <!-- Messages -->
        <section class="flex-1 overflow-y-auto px-10 py-8 bg-[#f7f5ef]">
          <div
            id="messages-container"
            class="max-w-3xl mx-auto space-y-5"
          ></div>
        </section>

        <!-- Input -->
        <footer class="border-t border-[#ddd] bg-white px-8 py-6">
          <form id="chat-form" class="max-w-3xl mx-auto flex gap-4 items-end">
            <textarea
              id="message-input"
              rows="2"
              class="flex-1 rounded-2xl border border-[#ddd] bg-[#f7f5ef] px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-black"
              placeholder="Type a message for Felix…"
            ></textarea>

            <button
              type="submit"
              class="rounded-2xl bg-black text-white px-6 py-3 text-sm font-semibold hover:opacity-90 transition"
            >
              Send
            </button>
          </form>
        </footer>
      </main>
    </div>
  </body>
</html>
