<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Felix AI</title>
    <link rel="stylesheet" href="styling.css" />
  </head>

  <body>
    <div class="chat-wrapper">
      <div class="chat-header">
        <div class="pawprints">🐾 🐾</div>

        <div>
          <h1>Felix AI</h1>
          <p>Your intelligent feline assistant</p>
        </div>
      </div>

      <ul id="chatWindow" class="chat-window">
        <li class="bot-message">Meow 🐾 I'm Felix. Ask me anything.</li>
      </ul>

      <div id="thinking" class="thinking hidden">purrrrocessing....</div>

      <form id="chatForm" class="input-area">
        <input
          id="messageInput"
          type="text"
          placeholder="Type your message..."
          required
        />
        <button type="submit">Send</button>
      </form>
    </div>

    <script src="app.js"></script>
  </body>
</html>
